{% extends "base.html" %}
{% load static %}

{% block title %}المحادثة الطبية | منصتك الطبية{% endblock %}

{% block content %}

<section class="chat-page">
    <div class="container">

        <h2>المحادثة الطبية</h2>

        <div id="messagesContainer" style="height:300px; overflow:auto; border:1px solid #ddd; padding:10px;">
            {% for msg in chat_messages %}
                <p>
                    <strong>{{ msg.sender_name }}:</strong>
                    {{ msg.content }}
                </p>
            {% empty %}
                <p>لا توجد رسائل بعد</p>
            {% endfor %}
        </div>

        <form id="chatForm">
            <textarea id="chatMessageInput" rows="3" style="width:100%;"></textarea>
            <button type="submit">إرسال</button>
        </form>

    </div>
</section>

<script>

    const appointmentId = "{{ appointment.id }}";

    const isDoctorStarted = {{ chat_timing.doctor_started_chat|yesno:"true,false" }};
    const isChatClosed = {{ chat_timing.chat_closed|yesno:"true,false" }};

    // ✅ التعديل المهم
    const isDoctor = {% if appointment.doctor.user_id == request.user.id %}true{% else %}false{% endif %};

    let currentUserCanSend = {{ current_user_can_send|yesno:"true,false" }};
    let remainingSeconds = {% if chat_timing.remaining_seconds != None %}{{ chat_timing.remaining_seconds }}{% else %}null{% endif %};

    const messagesContainer = document.getElementById("messagesContainer");
    const messageInput = document.getElementById("chatMessageInput");
    const chatForm = document.getElementById("chatForm");

    let chatSocket = null;

    function appendMessage(sender, message) {
        const p = document.createElement("p");
        p.innerHTML = "<strong>" + sender + ":</strong> " + message;
        messagesContainer.appendChild(p);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function setupSocket() {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socketUrl = `${protocol}://${window.location.host}/ws/appointments/${appointmentId}/chat/`;

        chatSocket = new WebSocket(socketUrl);

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);

            if (data.event === "chat_message") {
                appendMessage(data.sender, data.message);
            }
        };
    }

    chatForm.addEventListener("submit", function(e) {
        e.preventDefault();

        const message = messageInput.value.trim();
        if (!message) return;

        chatSocket.send(JSON.stringify({
            message: message
        }));

        messageInput.value = "";
    });

    setupSocket();

</script>

{% endblock %}
